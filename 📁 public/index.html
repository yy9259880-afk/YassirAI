<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>YassirAI</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>🤖 YassirAI</h1>

        <p class="subtitle">
            مساعدك الذكي الشخصي
        </p>

        <div class="assistant">

            <div id="face">

                <div class="eyes">

                    <div class="eye">
                        <div class="pupil"></div>
                    </div>

                    <div class="eye">
                        <div class="pupil"></div>
                    </div>

                </div>

                <div id="mouth"></div>

            </div>

        </div>

        <div class="status" id="status">
            اضغط على الزر وابدأ الحديث
        </div>

        <!-- منطقة المحادثة -->
        <div class="chat" id="chat">

            <div class="message ai" id="result">
                👋 مرحباً، أنا YassirAI. كيف أستطيع مساعدتك اليوم؟
            </div>

        </div>

        <button id="startBtn">
            🎤 ابدأ التحدث
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
